<div class="create-layout">
  <div class="form-container">
    <div class="header">
      <h2>Create a New Project</h2>
      <a routerLink="/dashboard" class="back-link">← Back to Dashboard</a>
    </div>

    <div class="form-group">
      <label>Project Name</label>
      <input type="text" [(ngModel)]="name" placeholder="My Awesome Project">
    </div>

    <div class="form-group">
      <label>Description</label>
      <textarea [(ngModel)]="description" placeholder="A brief description of what this project does..."></textarea>
    </div>

    <div class="form-group">
      <label>Language</label>
      <select [(ngModel)]="language">
        <option value="javascript">JavaScript (Node.js)</option>
        <option value="python">Python</option>
        <option value="csharp">C# (.NET)</option>
        <option value="html">HTML/CSS/JS</option>
        <option value="java">Java</option>
        <option value="go">Go</option>
      </select>
    </div>

    <div class="form-group">
      <label>Visibility</label>
      <select [(ngModel)]="visibility">
        <option value="PUBLIC">Public (Anyone can see it)</option>
        <option value="PRIVATE">Private (Only you and collaborators)</option>
      </select>
    </div>

    <button class="submit-btn" (click)="onSubmit()">Create Project</button>
  </div>
</div>
