<div class="dashboard-layout">
  <!-- Sidebar / Nav -->
  <aside class="sidebar">
    <div class="brand">CodeSync</div>
    <nav>
      <a routerLink="/dashboard" class="active">My Projects</a>
      <a routerLink="/explore">Explore Public</a>
    </nav>
    <button class="logout-btn" (click)="logout()">Logout</button>
  </aside>

  <!-- Main Content -->
  <main class="content">
    <header>
      <div class="header-left">
        <h1>Welcome back, {{ username }}!</h1>
        <p>Manage your projects and continue collaborating.</p>
      </div>
      <button class="new-project-btn" routerLink="/projects/new">+ New Project</button>
    </header>

    <div class="projects-grid">
      <div *ngIf="projects.length === 0" class="empty-state">
        <p>You haven't created any projects yet.</p>
      </div>

      <div class="project-card" *ngFor="let p of projects" [routerLink]="['/editor', p.projectId, 0]">
        <div class="card-header">
          <h3>{{ p.name }}</h3>
          <div class="header-actions">
            <span class="badge">{{ p.language }}</span>
            <button class="delete-btn" (click)="deleteProject(p.projectId, $event)" title="Delete Project">
              <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" viewBox="0 0 16 16">
                <path d="M5.5 5.5A.5.5 0 0 1 6 6v6a.5.5 0 0 1-1 0V6a.5.5 0 0 1 .5-.5zm2.5 0a.5.5 0 0 1 .5.5v6a.5.5 0 0 1-1 0V6a.5.5 0 0 1 .5-.5zm3 .5a.5.5 0 0 0-1 0v6a.5.5 0 0 0 1 0V6z"/>
                <path fill-rule="evenodd" d="M14.5 3a1 1 0 0 1-1 1H13v9a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V4h-.5a1 1 0 0 1-1-1V2a1 1 0 0 1 1-1H6a1 1 0 0 1 1-1h2a1 1 0 0 1 1 1h3.5a1 1 0 0 1 1 1v1zM4.118 4 4 4.059V13a1 1 0 0 0 1 1h6a1 1 0 0 0 1-1V4.059L11.882 4H4.118zM2.5 3V2h11v1h-11z"/>
              </svg>
            </button>
          </div>
        </div>
        <p class="desc">{{ p.description }}</p>
        <div class="card-footer">
          <span>⭐ {{ p.starCount }}</span>
          <span>Visibility: {{ p.visibility }}</span>
        </div>
      </div>
    </div>
  </main>
</div>
