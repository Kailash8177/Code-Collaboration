version: "1"

databases:
  - name: codesync-db
    plan: free
    databaseName: codesync

services:
  # 1. Combined Backend (Runs all 7 services + Gateway)
  - type: web
    name: codesync-api-all
    env: docker
    dockerfilePath: ./Dockerfile.combined
    plan: free
    envVars:
      - key: ASPNETCORE_ENVIRONMENT
        value: Production
      - key: ConnectionStrings__AuthDb
        fromDatabase:
          name: codesync-db
          property: connectionString
      - key: ConnectionStrings__ProjectDb
        fromDatabase:
          name: codesync-db
          property: connectionString
      - key: ConnectionStrings__FileDb
        fromDatabase:
          name: codesync-db
          property: connectionString
      - key: ConnectionStrings__CollabDb
        fromDatabase:
          name: codesync-db
          property: connectionString
      - key: ConnectionStrings__ExecutionDb
        fromDatabase:
          name: codesync-db
          property: connectionString
      - key: ConnectionStrings__NotificationDb
        fromDatabase:
          name: codesync-db
          property: connectionString
      - key: ConnectionStrings__ReviewHubDb
        fromDatabase:
          name: codesync-db
          property: connectionString
      - key: Jwt__Secret
        value: "CodeSync_Super_Secret_Key_For_JWT_123!"
      - key: ReverseProxy__Clusters__execution-cluster__Destinations__destination1__Address
        value: https://codesync-execution.onrender.com
      - key: ReverseProxy__Clusters__notification-cluster__Destinations__destination1__Address
        value: https://codesync-notification.onrender.com
      - key: ReverseProxy__Clusters__reviewhub-cluster__Destinations__destination1__Address
        value: https://codesync-reviewhub.onrender.com

  # 3. Execution Service (Separate App)
  - type: web
    name: codesync-execution
    env: docker
    rootDir: .
    dockerfilePath: backend/CodeSync.Execution/Dockerfile
    plan: free
    envVars:
      - key: ASPNETCORE_ENVIRONMENT
        value: Production
      - key: ConnectionStrings__ExecutionDb
        fromDatabase:
          name: codesync-db
          property: connectionString
      - key: Jwt__Secret
        value: "CodeSync_Super_Secret_Key_For_JWT_123!"

  # 4. Notification Service (Separate App)
  - type: web
    name: codesync-notification
    env: docker
    rootDir: .
    dockerfilePath: backend/CodeSync.Notification/Dockerfile
    plan: free
    envVars:
      - key: ASPNETCORE_ENVIRONMENT
        value: Production
      - key: ConnectionStrings__NotificationDb
        fromDatabase:
          name: codesync-db
          property: connectionString
      - key: Jwt__Secret
        value: "CodeSync_Super_Secret_Key_For_JWT_123!"

  # 5. ReviewHub Service (Separate App)
  - type: web
    name: codesync-reviewhub
    env: docker
    rootDir: .
    dockerfilePath: backend/CodeSync.ReviewHub/Dockerfile
    plan: free
    envVars:
      - key: ASPNETCORE_ENVIRONMENT
        value: Production
      - key: ConnectionStrings__ReviewHubDb
        fromDatabase:
          name: codesync-db
          property: connectionString
      - key: Jwt__Secret
        value: "CodeSync_Super_Secret_Key_For_JWT_123!"

  # 2. Frontend (Angular UI)
  - type: web
    name: codesync-ui
    env: static
    buildCommand: cd frontend/codesync-ui && npm install && npm run build -- --configuration production
    staticPublishPath: ./frontend/codesync-ui/dist/codesync-ui/browser
    routes:
      # Proxy all API calls to the combined backend
      - type: rewrite
        source: /gateway/*
        destination: https://codesync-api-all.onrender.com/gateway/*
      # Single Page Application (SPA) routing
      - type: rewrite
        source: /*
        destination: /index.html
